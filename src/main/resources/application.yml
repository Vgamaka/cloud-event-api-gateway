server:
  port: 8080

spring:
  application:
    name: cloud-event-api-gateway

  cloud:
    gateway:
      # -----------------------------
      # 🌐 GLOBAL CORS CONFIGURATION
      # -----------------------------
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:5173"
              - "https://cloudeventsystem.netlify.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # -----------------------------
      # 🔁 ROUTES
      # -----------------------------
      server:
        webflux:
          routes:
            # 🔐 AUTH SERVICE
            - id: auth-service
              uri: https://auth-service.greenbay-a2b6478d.centralindia.azurecontainerapps.io
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=2

            # 📅 EVENT SERVICE
            - id: event-service
              uri: https://event-service.ambitiousmeadow-e7af242d.southeastasia.azurecontainerapps.io
              predicates:
                - Path=/api/events/**
              filters:
                - StripPrefix=2

            # 📝 REGISTRATION SERVICE
            - id: registration-service
              uri: http://localhost:8003
              predicates:
                - Path=/api/register/**
              filters:
                - StripPrefix=2

            # 🔔 NOTIFICATION SERVICE
            - id: notification-service
              uri: http://localhost:8004
              predicates:
                - Path=/api/notify/**
              filters:
                - StripPrefix=2

      # -----------------------------
      # 🛠 FIX DUPLICATE HEADERS ISSUE
      # -----------------------------
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# -----------------------------
# 🔍 ACTUATOR (OPTIONAL)
# -----------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
