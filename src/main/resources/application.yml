server:
  port: 8080

spring:
  application:
    name: cloud-event-api-gateway

  cloud:
    gateway:
      # -----------------------------
      # ROUTES
      # -----------------------------
      routes:
        # AUTH SERVICE
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:https://auth-service.greenbay-a2b6478d.centralindia.azurecontainerapps.io}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2

        # EVENT SERVICE
        - id: event-service
          uri: ${EVENT_SERVICE_URL:https://event-service.greenbay-a2b6478d.centralindia.azurecontainerapps.io}
          predicates:
            - Path=/api/events/**
          filters:
            - StripPrefix=1

        # REGISTRATION SERVICE
        - id: registration-service
          uri: ${REGISTRATION_SERVICE_URL:https://registration-service.greenbay-a2b6478d.centralindia.azurecontainerapps.io}
          predicates:
            - Path=/api/register/**
          filters:
            - StripPrefix=2

        # NOTIFICATION SERVICE
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:https://notification-service.greenbay-a2b6478d.centralindia.azurecontainerapps.io}
          predicates:
            - Path=/api/notify/**
          filters:
            - RewritePath=/api/notify/(?<segment>.*), /${segment}

        # TEST ROUTE
        - id: test-route
          uri: https://httpbin.org
          predicates:
            - Path=/test/**
          filters:
            - StripPrefix=1

        # -----------------------------
        # 🔥 CORS PREFLIGHT FIX (IMPORTANT)
        # -----------------------------
        - id: cors-preflight
          uri: http://localhost
          predicates:
            - Method=OPTIONS
          filters:
            - SetStatus=200

      # -----------------------------
      # GLOBAL CORS CONFIGURATION
      # -----------------------------
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "https://cloudeventsystem.netlify.app"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      # -----------------------------
      # FIX DUPLICATE HEADERS ISSUE
      # -----------------------------
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

management:
  endpoints:
    web:
      exposure:
        include: health,info
